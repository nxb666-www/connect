server:
  port: 8082

spring:
  application:
    name: social-post
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/social_platform?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: qwe#123
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
  data:
    redis:
      host: localhost
      port: 6379

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: AUTO

rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: social-producer-group

spring.cloud:
  sentinel:
    transport:
      dashboard: localhost:8858
    eager: true

seata:
  enabled: true
  application-id: social-post
  tx-service-group: social-platform-tx-group
  service:
    vgroup-mapping:
      social-platform-tx-group: default
  registry:
    type: nacos
    nacos:
      application: seata-server
      server-addr: localhost:8848
  config:
    type: nacos
    nacos:
      server-addr: localhost:8848

jwt:
  secret: socialPlatformSecretKey2024VeryLongAndSecure
  expiration: 86400000
